<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(180deg,#ffd6e7,#ff9ec4,#ff6fa5);
  overflow:hidden;
  color:white;
  font-family: 'Poppins', sans-serif;
}

/* BUBBLES */
.bubbles span {
  position:absolute;
  bottom:-100px;
  width:20px;
  height:20px;
  background:rgba(255,255,255,0.4);
  border-radius:50%;
  animation:rise 10s infinite ease-in;
}
.bubbles span:nth-child(1){left:10%;animation-duration:8s;}
.bubbles span:nth-child(2){left:30%;animation-duration:12s;}
.bubbles span:nth-child(3){left:50%;animation-duration:6s;}
.bubbles span:nth-child(4){left:70%;animation-duration:10s;}
.bubbles span:nth-child(5){left:85%;animation-duration:14s;}

@keyframes rise {
  0%{transform:translateY(0);opacity:0.6;}
  100%{transform:translateY(-110vh);opacity:0;}
}

/* CARD */
.container {
  text-align:center;
  padding:50px;
  border-radius:25px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* LOGO */
.logo {
  width:90px;
  border-radius:50%;
  margin-bottom:20px;
  animation:float 3s infinite ease-in-out;
}

@keyframes float {
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

/* TEXT */


/* MAIN HEADING */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 700;
  letter-spacing: 2px;

  background: linear-gradient(45deg, #ffffff, #ffe0f0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

/* SUBTEXT */
p {
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.5px;
  opacity: 0.95;
}

/* LOADER */
.loader {
  margin:30px auto 0;
  width:50px;
  height:50px;
  border:5px solid rgba(255,255,255,0.3);
  border-top:5px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {100%{transform:rotate(360deg);}}





/* BUTTON */
.btn {
  margin-top:20px;
  padding:12px 25px;
  border-radius:30px;
  border:none;
  background:linear-gradient(45deg,#ff4e88,#ff2d6f);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- 🔥 BUBBLES CONTAINER (THIS WAS MISSING BEFORE) -->
<div class="bubbles">
  <span></span><span></span><span></span>
  <span></span><span></span>
</div>

<div class="container">
  <img src="logo.png" 
     alt="Choudhary Ice Cream Logo"
     width="90"
     height="90"
     loading="eager"
     decoding="async"
     class="logo">

  <h1>🍦 Coming Soon</h1>

  <!-- SEO TEXT -->
  <p>Premium ice cream & kulfi brand in Gujarat</p>
  <p>Perfect for weddings, parties & events</p>

  <div class="loader"></div>

  <button class="btn">Launching Soon 🚀</button>
</div>

</body>
</html>
